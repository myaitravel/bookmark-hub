<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OTT 모음</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f11; --surface: #18181c; --surface2: #222228;
    --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.15);
    --text: #f0f0f2; --text-muted: #888890; --text-faint: #44444c;
    --accent: #c8f04a; --accent-dim: rgba(200,240,74,0.12);
    --red: #ff5f5f; --radius: 14px; --radius-sm: 8px;
  }
  html { -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100dvh; padding: 40px 24px 80px; }
  .container { max-width: 960px; margin: 0 auto; }

  #lock-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 24px; }
  #lock-screen.hidden { display: none; }
  .lock-box { background: var(--surface); border: 1px solid var(--border-hover); border-radius: 20px; padding: 40px 32px; width: 320px; max-width: 95vw; text-align: center; }
  .lock-icon { font-size: 36px; margin-bottom: 12px; }
  .lock-title { font-family: 'Gmarket Sans', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .lock-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 28px; }
  .pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 8px; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border-hover); transition: all .15s; }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
  .pin-dot.error { background: var(--red); border-color: var(--red); }
  .pin-error { font-size: 12px; color: var(--red); min-height: 20px; margin-bottom: 16px; font-family: 'Gmarket Sans', sans-serif; }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .pin-key { padding: 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: 'Gmarket Sans', sans-serif; font-size: 18px; font-weight: 700; cursor: pointer; transition: all .15s; }
  .pin-key:hover { background: var(--accent-dim); border-color: rgba(200,240,74,0.3); color: var(--accent); }
  .pin-key:active { transform: scale(0.94); }
  .pin-key.del { font-size: 14px; color: var(--text-muted); }
  .pin-key.empty { visibility: hidden; pointer-events: none; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)} }

  #app { display: none; }
  #app.visible { display: block; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 36px; gap: 12px; }
  .logo { font-family: 'Gmarket Sans', sans-serif; font-weight: 700; font-size: clamp(20px, 4vw, 28px); letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .header-btns { display: flex; gap: 8px; }
  .hbtn { display: flex; align-items: center; gap: 6px; padding: 10px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text-muted); font-family: 'Gmarket Sans', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; transition: all 0.15s; white-space: nowrap; }
  .hbtn:hover { color: var(--text); border-color: var(--border-hover); }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }

  .card { border-radius: var(--radius); padding: 28px 20px; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 14px; transition: filter 0.15s, transform 0.15s; animation: fadeIn 0.2s ease both; border: 1px solid transparent; }
  .card:hover { filter: brightness(1.15); transform: translateY(-2px); }
  @media (hover: none) { .card:active { filter: brightness(1.15); transform: scale(0.97); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .card-netflix  { background: #1a0000; border-color: #E50914; }
  .card-tving    { background: #1a0008; border-color: #FF153C; }
  .card-wavve    { background: #00081a; border-color: #2A6FDB; }
  .card-disney   { background: #00051a; border-color: #113CCF; }
  .card-coupang  { background: #1a0002; border-color: #E31D24; }
  .card-prime    { background: #00081a; border-color: #00A8E1; }

  .card-icon { width: 64px; height: 64px; border-radius: 16px; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .card-icon img { width: 44px; height: 44px; object-fit: contain; }
  .card-name { font-family: 'Gmarket Sans', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }
  .card-host { font-size: 11px; color: var(--text-faint); }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-icon">🎬</div>
    <div class="lock-title">OTT 모음</div>
    <div class="lock-sub" id="lockSub">비밀번호를 입력하세요</div>
    <div class="pin-dots">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
      <div class="pin-dot" id="dot-4"></div>
      <div class="pin-dot" id="dot-5"></div>
    </div>
    <div class="pin-error" id="pinError"></div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinInput('1')">1</button>
      <button class="pin-key" onclick="pinInput('2')">2</button>
      <button class="pin-key" onclick="pinInput('3')">3</button>
      <button class="pin-key" onclick="pinInput('4')">4</button>
      <button class="pin-key" onclick="pinInput('5')">5</button>
      <button class="pin-key" onclick="pinInput('6')">6</button>
      <button class="pin-key" onclick="pinInput('7')">7</button>
      <button class="pin-key" onclick="pinInput('8')">8</button>
      <button class="pin-key" onclick="pinInput('9')">9</button>
      <button class="pin-key empty"></button>
      <button class="pin-key" onclick="pinInput('0')">0</button>
      <button class="pin-key del" onclick="pinDelete()">⌫</button>
    </div>
  </div>
</div>

<div id="app">
  <div class="container">
    <header>
      <div class="logo">OTT<span>.</span></div>
      <div class="header-btns">
        <button class="hbtn" onclick="lockApp()">🔒 잠금</button>
        <a class="hbtn" href="index.html">← 허브</a>
      </div>
    </header>
    <div class="grid">
      <a class="card card-netflix" href="https://netflix.com" target="_blank" rel="noopener">
        <div class="card-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=netflix.com" onerror="this.parentNode.textContent='🎬'"></div>
        <div class="card-name">넷플릭스</div>
        <div class="card-host">netflix.com</div>
      </a>
      <a class="card card-tving" href="https://tving.com" target="_blank" rel="noopener">
        <div class="card-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=tving.com" onerror="this.parentNode.textContent='🎬'"></div>
        <div class="card-name">티빙</div>
        <div class="card-host">tving.com</div>
      </a>
      <a class="card card-wavve" href="https://wavve.com" target="_blank" rel="noopener">
        <div class="card-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=wavve.com" onerror="this.parentNode.textContent='🎬'"></div>
        <div class="card-name">웨이브</div>
        <div class="card-host">wavve.com</div>
      </a>
      <a class="card card-disney" href="https://disneyplus.com" target="_blank" rel="noopener">
        <div class="card-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=disneyplus.com" onerror="this.parentNode.textContent='🎬'"></div>
        <div class="card-name">디즈니+</div>
        <div class="card-host">disneyplus.com</div>
      </a>
      <a class="card card-coupang" href="https://play.coupang.com" target="_blank" rel="noopener">
        <div class="card-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=play.coupang.com" onerror="this.parentNode.textContent='🎬'"></div>
        <div class="card-name">쿠팡플레이</div>
        <div class="card-host">play.coupang.com</div>
      </a>
      <a class="card card-prime" href="https://primevideo.com" target="_blank" rel="noopener">
        <div class="card-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=primevideo.com" onerror="this.parentNode.textContent='🎬'"></div>
        <div class="card-name">Prime Video</div>
        <div class="card-host">primevideo.com</div>
      </a>
    </div>
  </div>
</div>

<script>
const PIN_KEY = 'ott_pin';
const PIN_LEN = 6;
var pinBuffer = '';
var pinMode = 'check';

function initLock() {
  var saved = localStorage.getItem(PIN_KEY);
  if (!saved) {
    pinMode = 'setup';
    document.getElementById('lockSub').textContent = '사용할 비밀번호 6자리를 설정하세요';
  } else {
    pinMode = 'check';
    document.getElementById('lockSub').textContent = '비밀번호를 입력하세요';
  }
}
function pinInput(num) {
  if (pinBuffer.length >= PIN_LEN) return;
  pinBuffer += num;
  updateDots();
  if (pinBuffer.length === PIN_LEN) setTimeout(checkPin, 120);
}
function pinDelete() {
  pinBuffer = pinBuffer.slice(0, -1);
  updateDots();
}
function updateDots() {
  for (var i = 0; i < PIN_LEN; i++) {
    var d = document.getElementById('dot-' + i);
    d.classList.toggle('filled', i < pinBuffer.length);
    d.classList.remove('error');
  }
  document.getElementById('pinError').textContent = '';
}
function checkPin() {
  var saved = localStorage.getItem(PIN_KEY);
  if (pinMode === 'setup') {
    localStorage.setItem(PIN_KEY, pinBuffer);
    document.getElementById('lock-screen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
  } else {
    if (pinBuffer === saved) {
      document.getElementById('lock-screen').classList.add('hidden');
      document.getElementById('app').classList.add('visible');
    } else {
      for (var i = 0; i < PIN_LEN; i++) document.getElementById('dot-' + i).classList.add('error');
      document.getElementById('pinError').textContent = '비밀번호가 틀렸어요';
      setTimeout(function() { pinBuffer = ''; updateDots(); }, 600);
      return;
    }
  }
  pinBuffer = '';
}
function lockApp() {
  pinBuffer = '';
  updateDots();
  document.getElementById('lock-screen').classList.remove('hidden');
  document.getElementById('app').classList.remove('visible');
  initLock();
}
document.addEventListener('keydown', function(e) {
  if (document.getElementById('lock-screen').classList.contains('hidden')) return;
  if (e.key >= '0' && e.key <= '9') pinInput(e.key);
  if (e.key === 'Backspace') pinDelete();
});
initLock();
</script>
</body>
</html>
